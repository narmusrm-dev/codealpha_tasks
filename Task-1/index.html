<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Age Calculator</h1>
        <form id="age-form">
            <div class="input-group">
                <div class="input-field">
                    <label for="day">Day</label>
                    <input type="number" id="day" min="1" max="31" placeholder="DD" required>
                </div>
                <div class="input-field">
                    <label for="month">Month</label>
                    <input type="number" id="month" min="1" max="12" placeholder="MM" required>
                </div>
                <div class="input-field">
                    <label for="year">Year</label>
                    <input type="number" id="year" min="1900" max="2026" placeholder="YYYY" required>
                </div>
            </div>
            <button type="submit">Calculate Age</button>
        </form>
        <div id="result" class="result hidden">
            <h2>Your Age</h2>
            <div class="age-display">
                <div class="age-box">
                    <span id="years">0</span>
                    <p>Years</p>
                </div>
                <div class="age-box">
                    <span id="months">0</span>
                    <p>Months</p>
                </div>
                <div class="age-box">
                    <span id="days">0</span>
                    <p>Days</p>
                </div>
            </div>
        </div>
        <p id="error" class="error hidden"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
